<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administradores - UAM Cuajimalpa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --uam-orange: #f39200;
            --uam-black: #1a1a1a;
            --bg-gray: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
            padding: 50px;
            text-align: center;
        }

        .login-header img {
            width: 150px;
            margin-bottom: 20px;
        }

        .login-header h2 {
            color: var(--uam-black);
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--uam-orange);
            outline: none;
            box-shadow: 0 0 0 3px rgba(243,146,0,0.1);
        }

        .btn-login {
            background: var(--uam-orange);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #e07d00;
        }

        .forgot-password {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-password:hover {
            color: var(--uam-orange);
        }

        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <img src="https://lh3.googleusercontent.com/proxy/owi7VzomYwFCE80U-3AVUf4U_gpCyCFmpCheSBdlqGDzvYi7vW0TISMO_3gnS2cjSOc8caYMrd210F_-lfZLBQIRa0_yULswjBcnJ0aR-wXg8wk3V5HB" alt="UAM">
        <h2>Panel de Administración</h2>
        <p>Sistema de Control de Acceso UAM Cuajimalpa</p>
    </div>

    <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Usuario</label>
        <input type="text" id="username" placeholder="Ingrese su usuario">
    </div>

    <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Contraseña</label>
        <input type="password" id="password" placeholder="Ingrese su contraseña">
    </div>

    <button class="btn-login" onclick="validateLogin()">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Iniciar Sesión
    </button>

    <div class="error-message" id="error-message">
        <i class="fa-solid fa-exclamation-circle"></i> Usuario o contraseña incorrectos
    </div>

    <div class="forgot-password" onclick="window.location.href='recuperar_password.html'">
        <i class="fa-solid fa-question-circle"></i> ¿Olvidó su contraseña?
    </div>

</div>

<script>
    function validateLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Simulación de validación con la tabla administrador
        // En producción, esto validaría contra la base de datos
        if (username === "admin" && password === "admin123") {
            // Guardar sesión simulada
            sessionStorage.setItem('admin_logged', 'true');
            sessionStorage.setItem('admin_user', username);
            window.location.href = "dashboard.html";
        } else {
            document.getElementById('error-message').style.display = 'block';
        }
    }
</script>
</body>
</html>
